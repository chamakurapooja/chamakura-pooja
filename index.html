<!DOCTYPE html>
<html>
<head>
    <title>PROJECT DEMO</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: aqua;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .navbar {
            background-color: #007BFF;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            margin: 0 25px;
            font-size: 18px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #ffd700;
        }

        section {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .home-section {
            min-height: 100vh;
            display: none;
            flex-direction: column;
            justify-content: center;
        }

        form {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border: #007BFF 1px solid;
            border-radius: 20px;
            margin: auto;
            background: white;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 18px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        textarea {
            resize: none;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Welcome to Demo</h1>

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
    <a href="#login">Login</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<section id="home" class="home-section">
    <h1>Project Registration</h1>

    <form id="registrationForm">

        <label>Student Name:</label>
        <input type="text" id="student_name" required>

        <label>Father Name:</label>
        <input type="text" id="father_name" required>

        <label>Mother Name:</label>
        <input type="text" id="mother_name" required>

        <label>Student ID:</label>
        <input type="text" id="student_id" required>

        <label>Project Title:</label>
        <input type="text" id="project_title" required>

        <label>College Name:</label>
        <input type="text" id="college_name" required>

        <label>Contact:</label>
        <input type="text" id="contact_number" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Upload Project Documentation:</label>
        <input type="file" id="project_doc" accept=".pdf,.doc,.docx" required>

        <button type="submit">Register</button>

        <p id="registerMessage" class="success"></p>
    </form>
</section>

<section id="about">
    <h2>About</h2>
    <p>This demo website allows students to submit their project details.</p>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <form id="contactForm">
        <input type="text" id="contactName" placeholder="Name" required>
        <input type="email" id="contactEmail" placeholder="Email" required>
        <textarea rows="5" id="contactMessage" placeholder="Message" required></textarea>
        <button type="submit">Send Message</button>
        <p id="contactSuccess" class="success"></p>
    </form>
</section>

<section id="login">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Enter email" required>
        <input type="password" id="loginPassword" placeholder="Enter password" required>
        <button type="submit">Login</button>
        <p id="loginMessage" class="success"></p>
    </form>
</section>

<script>

document.addEventListener("DOMContentLoaded", function () {

let homeSection = document.getElementById("home");
let isLoggedIn = localStorage.getItem("isLoggedIn") === "true";


if (isLoggedIn) {
    homeSection.style.display = "flex";
}


document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if (email === "admin@gmail.com" && password === "1234") {
        localStorage.setItem("isLoggedIn", "true");

        document.getElementById("loginMessage").textContent =
            "Login Successful! You can now submit your project.";

        homeSection.style.display = "flex";
        location.hash = "#home";
    } else {
        document.getElementById("loginMessage").textContent =
            "Invalid login details.";
    }

    document.getElementById("loginForm").reset();
});


window.logout = function() {
    localStorage.removeItem("isLoggedIn");
    alert("Logged out successfully");
    location.reload();
}


document.getElementById("registrationForm").addEventListener("submit", function(e) {
    e.preventDefault();

    if (localStorage.getItem("isLoggedIn") !== "true") {
        alert("Please login first!");
        return;
    }

    let fileInput = document.getElementById("project_doc");
    let fileName = fileInput.files.length > 0 ? fileInput.files[0].name : "";

    const student = {
        name: document.getElementById("student_name").value,
        father: document.getElementById("father_name").value,
        mother: document.getElementById("mother_name").value,
        id: document.getElementById("student_id").value,
        project: document.getElementById("project_title").value,
        college: document.getElementById("college_name").value,
        contact: document.getElementById("contact_number").value,
        email: document.getElementById("email").value,
        document: fileName
    };

    localStorage.setItem("studentData", JSON.stringify(student));

    document.getElementById("registerMessage").textContent =
        "Project submitted successfully! File uploaded: " + fileName;

    document.getElementById("registrationForm").reset();
});


document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("contactSuccess").textContent =
        "Message sent successfully!";

    document.getElementById("contactForm").reset();
});

});

</script>

</body>
</html>
